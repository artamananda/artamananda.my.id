<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@artamananda</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="px-6 pt-8 pb-6">
        <h3 class="text-xl text-center font-bold">Berikan pesan anonim kepada Arta</h3>
    </div>
    <div class="bg-gray-200 rounded-2xl p-8 text-center w-11/12 mx-auto">
        <form action="https://artamananda.my.id/" onsubmit="return isValid(this.question.value)">
          <div class="mb-3 text-center">
            <label class="block text-gray-700 text-lg font-medium mb-2" for="question">
              Pesanmu :
            </label>
            <textarea class="w-11/12 rounded-3xl shadow appearance-none border rounded py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" name="question" id="question" rows="4" placeholder="Tulis pesanmu disini ..."></textarea>
          </div>
          <div class="mb-4 text-center">
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">
              Kirim
            </button>
          </div>
        </form>
      </div>
      <div class="px-6 pt-10 pb-4">
        <h3 class="text-xl text-center font-bold">Pesan sebelumnya</h3>
      </div>
      <div id="x" class="x"></div>
      <div class="w-10/12 text-center m-auto p-8">
        <div class="text-center">Copyright © Artamananda 2022. Powered ℗ by Netlify</div>
      </div>

      <script src="https://code.jquery.com/jquery-3.6.3.min.js" integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>  
      <script src="https://sheet2api.com/v1/api.js"></script>
      <script src="assets/js/read.js"></script>
      <script src="assets/js/write.js"></script>
</body>

</html>
